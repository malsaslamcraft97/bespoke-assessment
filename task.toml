schema_version = "1.1"

[task]
name = "INCUBYTE/hard-devops-task"
description = "Provision a Dockerized Postgres + NestJS API stack on a fresh Linux host: install Docker via Ansible, deploy with docker-compose, and expose an HTTP probe endpoint that runs SELECT 1 against Postgres."
authors = [
  { name = "Aslam", email = "aslam@incubyte.co" },
]
keywords = [
  "ansible",
  "docker",
  "docker-compose",
  "postgres",
  "nestjs",
  "orchestration",
  "deployment",
]

[metadata]
difficulty_explanation = "The agent must author every component from scratch: an Ansible playbook that installs Docker Engine and the Compose plugin on a minimal Ubuntu host without an init system, a docker-compose stack defining Postgres 16 and a NestJS service, the complete NestJS application source (TypeScript, package manifest, Dockerfile), and an HTTP endpoint that executes a real SELECT 1 against Postgres. The recurring failure mode is incomplete execution: agents commonly produce all the configuration and source files but stop before running the playbook and bringing the stack up, conflating file authoring with task completion."
category = "devops"

[verifier]
timeout_sec = 900.0

[agent]
timeout_sec = 1800.0

[environment]
build_timeout_sec = 900.0
os = "linux"
cpus = 2
memory_mb = 4096
storage_mb = 12288
allow_internet = true