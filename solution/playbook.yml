---
# Oracle Ansible playbook.
#
# Installs Docker Engine and the Docker Compose plugin from Docker's
# official apt repository, then starts the daemon. Designed to run inside
# a privileged container with no init system (no systemd), so dockerd is
# launched directly via nohup rather than `service` / `systemctl`.

- name: Install Docker Engine and the Compose plugin
  hosts: localhost
  connection: local
  become: true
  gather_facts: true

  vars:
    # Translate Ansible's architecture facts into Docker's apt arch labels.
    docker_arch: "{{ {'x86_64': 'amd64', 'aarch64': 'arm64'}.get(ansible_architecture, ansible_architecture) }}"
    # Use the running distribution's codename (e.g. "noble" for 24.04).
    docker_codename: "{{ ansible_distribution_release }}"

  tasks:
    - name: Install prerequisite packages
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: true

    - name: Ensure /etc/apt/keyrings exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Install Docker GPG key
      ansible.builtin.shell: |
        set -e
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
          | gpg --dearmor --yes -o /etc/apt/keyrings/docker.gpg
        chmod a+r /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Configure Docker apt repository
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/docker.list
        mode: "0644"
        content: |
          deb [arch={{ docker_arch }} signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ docker_codename }} stable

    - name: Install Docker Engine and Compose plugin
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Check whether dockerd is already running
      ansible.builtin.shell: pgrep -x dockerd || true
      register: dockerd_pid
      changed_when: false

    - name: Start dockerd in the background
      ansible.builtin.shell: |
        nohup dockerd > /var/log/dockerd.log 2>&1 &
      when: dockerd_pid.stdout == ""
      changed_when: true

    - name: Wait for the Docker socket to be ready
      ansible.builtin.wait_for:
        path: /var/run/docker.sock
        timeout: 60

    - name: Verify Docker is reachable
      ansible.builtin.command: docker info
      changed_when: false
